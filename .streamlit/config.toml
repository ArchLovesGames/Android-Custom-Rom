[theme]
font = "sans-serif"
baseRadius = "8px"
buttonRadius = "8px"
showWidgetBorder = true
showSidebarBorder = true
linkUnderline = false
chartCategoricalColors = [
    "#2563eb",
    "#16a34a",
    "#dc2626",
    "#9333ea",
    "#f59e0b",
    "#0891b2",
]

[theme.light]
primaryColor = "#2563eb"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8fafc"
textColor = "#111827"
linkColor = "#1d4ed8"
codeTextColor = "#111827"
codeBackgroundColor = "#f3f4f6"
borderColor = "#d1d5db"
redColor = "#dc2626"
greenColor = "#16a34a"
blueColor = "#2563eb"
grayColor = "#4b5563"
dataframeBorderColor = "#d1d5db"
dataframeHeaderBackgroundColor = "#f3f4f6"

[theme.dark]
primaryColor = "#60a5fa"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#111827"
textColor = "#f8fafc"
linkColor = "#93c5fd"
codeTextColor = "#f8fafc"
codeBackgroundColor = "#1f2937"
borderColor = "#374151"
redColor = "#f87171"
greenColor = "#4ade80"
blueColor = "#60a5fa"
grayColor = "#9ca3af"
dataframeBorderColor = "#374151"
dataframeHeaderBackgroundColor = "#1f2937"

[theme.light.sidebar]
backgroundColor = "#f8fafc"
secondaryBackgroundColor = "#eef2ff"
textColor = "#111827"
borderColor = "#d1d5db"

[theme.dark.sidebar]
backgroundColor = "#020617"
secondaryBackgroundColor = "#111827"
textColor = "#f8fafc"
borderColor = "#334155"
