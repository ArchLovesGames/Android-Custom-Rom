stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - quality
  - security

default:
  image: python:3.13-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt

lint:
  stage: lint
  script:
    - ruff check .
    - pylint app.py tests
    - flake8 app.py tests

format:
  stage: format
  script:
    - ruff format --check .
    - pyupgrade --py313-plus app.py tests/*.py

type_check:
  stage: type_check
  script:
    - mypy app.py tests

quality:
  stage: quality
  script:
    - vulture app.py tests --min-confidence 90

test:
  stage: test
  script:
    - pytest --no-cov

coverage:
  stage: coverage
  script:
    - pytest --cov=app --cov-report=term-missing --cov-fail-under=55

security:
  stage: security
  script:
    - bandit -q -r app.py
    - pip-audit -r requirements.txt

semgrep:
  stage: security
  image:
    name: semgrep/semgrep:latest
    entrypoint: [""]
  before_script: []
  script:
    - semgrep --config .semgrep.yml --error --metrics off

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --source . --no-git --redact --config .gitleaks.toml

changelog:
  stage: quality
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  before_script: []
  script:
    - git-cliff --config cliff.toml --unreleased --strip header
