stages:
  - mirror

mirror_to_github:
  stage: mirror
  image: alpine:3.20
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache ca-certificates git
  script:
    - test -n "$GITHUB_MIRROR_TOKEN"
    - git remote set-url origin "$CI_REPOSITORY_URL"
    - git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune --tags
    - git remote set-head origin -d || true
    - git remote add github "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/ArchLovesGames/Android-Custom-Rom.git"
    - git push --prune github '+refs/remotes/origin/*:refs/heads/*'
    - git push --prune github '+refs/tags/*:refs/tags/*'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
