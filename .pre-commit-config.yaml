repos:
  - repo: local
    hooks:
      - id: python-syntax
        name: python syntax check
        entry: .venv/bin/python -m compileall app.py tests
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: .venv/bin/python -m pytest
        language: system
        pass_filenames: false
